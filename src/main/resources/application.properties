spring.application.name=7max
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:poker_tracker}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

server.port=${PORT:8080}

logging.file.name=C:/projects/tracker/logs/app.log
logging.level.com.sevenmax=DEBUG

app.wallets.starting-balance-editable=true

# Green-API WhatsApp Gateway (LOCAL ONLY - do not commit)
green-api.api-url=https://7107.api.greenapi.com
green-api.instance-id=7107596889
green-api.token=dc0818aec12340a592763b8dc4b4b302c8cb71bfc6ed4bcbb9

# KashCash API
kashcash.base-url=${KASHCASH_BASE_URL:https://prod-api.safecashapps.com/api/external/v1}
kashcash.username=${KASHCASH_USERNAME:}
kashcash.password=${KASHCASH_PASSWORD:}
kashcash.business-id=${KASHCASH_BUSINESS_ID:}
kashcash.pos-vendor-id=${KASHCASH_POS_VENDOR_ID:}
app.kashcash.callback-url=${KASHCASH_CALLBACK_URL:https://your-prod-domain/api/kashcash/webhook}
app.kashcash.notification-emails=${NOTIFY_EMAILS:}

# Email (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
